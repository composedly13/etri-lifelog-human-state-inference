# ──────────────────────────────────────────────────────────────────────────────
# ETRI 휴먼이해 AI 논문경진대회 - 기본 설정 파일 (configs/base.yaml)
#
# 파일명이나 경로가 바뀌어도 이 파일만 수정하면 전체 파이프라인에 반영됩니다.
# 인코딩: UTF-8
# ──────────────────────────────────────────────────────────────────────────────

# ── 경로 설정 ──────────────────────────────────────────────────────────────────
paths:
  # 데이터 위치:
  #   로컬 실행: "data/raw"  또는  "data"
  #   대회 코드 제출 기준: "/data"  (대회 서버 절대 경로)
  data_dir: "data/raw"

  # 파일명만 변경하면 됩니다 (경로는 data_dir에서 자동 조합)
  train_file:              "train.csv"
  test_file:               "test.csv"
  sample_submission_file:  "sample_submission.csv"

  # 출력 경로 (outputs/ 하위로 통일)
  output_dir:      "outputs"
  submission_dir:  "outputs/submissions"
  model_dir:       "outputs/models"
  log_dir:         "outputs/logs"
  figure_dir:      "outputs/figures"

# ── 데이터 설정 ────────────────────────────────────────────────────────────────
data:
  # ID 컬럼명
  # null 이면 sample_submission의 첫 번째 컬럼을 id_col로 자동 추론
  id_col: null

  # 예측 대상 컬럼 리스트
  # null 이면 sample_submission에서 id_col 제외 컬럼으로 자동 추론
  # 예시: ["sleep_quality", "fatigue", "stress"]
  target_cols: null

  # CSV 인코딩 (기본 utf-8, 실패 시 cp949 자동 시도)
  encoding: "utf-8"

# ── 피처 설정 ──────────────────────────────────────────────────────────────────
features:
  # Baseline 2: 날짜/요일/주말 파생 피처 생성 여부
  use_date_features: true

  # 날짜 컬럼 명시 (빈 리스트면 컬럼명 패턴으로 자동 감지)
  date_cols: []

  # 범주형 컬럼 명시 (빈 리스트면 object dtype으로 자동 감지)
  categorical_cols: []

  # 학습에서 제거할 컬럼 (id, target 외 추가로 제거할 컬럼)
  drop_cols: []

  # TODO (Proposed 1): 시간 맥락 피처 ─────────────────────────────────────
  use_lag_features: false
  lag_windows:     [1, 2, 3, 7]
  rolling_windows: [3, 7, 14]

  # TODO (Proposed 2): 개인별 기준선 피처 ──────────────────────────────────
  use_personal_baseline: false
  # 개인 식별 컬럼 (e.g. "user_id", "subject_id")
  group_col: null

# ── 모델 설정 ──────────────────────────────────────────────────────────────────
model:
  name: "lgbm"
  seed: 42

  lgbm_params:
    n_estimators:      1000
    learning_rate:     0.05
    num_leaves:        31
    max_depth:         -1
    min_child_samples: 20
    subsample:         0.8
    colsample_bytree:  0.8
    reg_alpha:         0.1
    reg_lambda:        0.1
    random_state:      42
    verbose:           -1
    n_jobs:            -1

  # TODO (Proposed 3): 앙상블 확장 시 추가 ──────────────────────────────────
  # catboost_params:
  #   iterations: 1000
  #   learning_rate: 0.05
  #   depth: 6
  #   random_seed: 42
  #   verbose: 0
  #
  # xgb_params:
  #   n_estimators: 1000
  #   learning_rate: 0.05
  #   max_depth: 6
  #   seed: 42

# ── 학습 설정 ──────────────────────────────────────────────────────────────────
training:
  n_folds:   5
  seed:      42   # KFold shuffle seed (model.seed와 동일하게 유지)

  # GroupKFold: user_id/subject_id 단위로 fold 분할 (데이터 누수 방지)
  # use_group_kfold: true로 설정하고 group_col을 지정하면 GroupKFold 사용
  use_group_kfold: false
  group_col:       null   # e.g. "user_id" 또는 "subject_id"

  early_stopping_rounds: 100

  # 평가 지표: 대회 공식 metric에 맞게 수정
  # 선택지: "rmse" | "mae" | "custom" (src/metrics.py 참조)
  eval_metric: "rmse"

# ── 실험 메타데이터 ────────────────────────────────────────────────────────────
experiment:
  name:        "baseline_v1"
  version:     "1.0.0"
  description: "Baseline 1: 원본 피처 + 기본 결측치 처리"

  # 실험 목적 메모 (experiment_log.md와 연동)
  # "Baseline 2: 날짜/요일/주말 피처 추가"
  # "Proposed 1: lag/rolling 시간 맥락 피처"
  # "Proposed 2: 개인별 기준선 deviation 피처"
  # "Proposed 3: LGB+CB+XGB 앙상블"
